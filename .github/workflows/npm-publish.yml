name: Publish npm

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Update npm to latest
        run: npm install -g npm@latest
      - name: Validate npm version against release tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi

          VERSION="${RELEASE_TAG#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$PACKAGE_VERSION" != "$VERSION" ]]; then
            echo "package.json version $PACKAGE_VERSION does not match $RELEASE_TAG" >&2
            exit 1
          fi
      - name: Publish
        run: npm publish --provenance --access public
        env:
          WILLH_NOW_RELEASE_ASSET_RETRIES: 12
          WILLH_NOW_RELEASE_ASSET_RETRY_DELAY_MS: 10000
